android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# JVM heap — GitHub-hosted runner 7GB RAM limit, 5GB güvenli üst sınır
org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=768m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Parallel build — runner 2 core, 1 worker daha güvenli (memory'i bölmez)
org.gradle.parallel=false
org.gradle.workers.max=1

# Daemon — CI'da no-daemon zaten kullanıyoruz, ama default'u da kapatalım
org.gradle.daemon=false

# Configure on demand — büyük modül yok, kapalı kalsın
org.gradle.configureondemand=false

# AAPT2 daemon idle time — kısa tut, RAM'i tutmasın
android.aapt2.daemonMaxIdleTime=10

# AGP compileSdk=35 + AGP 8.2.2 kombinasyon uyarısını sustur
android.suppressUnsupportedCompileSdk=35

# Resources optimize — APK küçük + processDebugResources daha hızlı
android.enableResourceOptimizations=true
