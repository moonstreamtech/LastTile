name: Android APK & AAB

on:
  push:
    branches: [main, master, 'claude/**', 'codex/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: android-native-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK + release AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      # LAYER 3 — pre-build secret check. Validates the three real
      # AdMob ids before any gradle task runs so CI fails fast on
      # missing or misconfigured secrets. The script never echoes
      # secret values; only the variable name and a pass/fail
      # decision are printed.
      - name: Verify release ad ids are real (pre-build)
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
          ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
        run: |
          set -e
          check_id() {
            local name=$1
            local value=$2
            if [ -z "$value" ]; then
              echo "$name: FAIL (empty)"
              exit 1
            fi
            if printf '%s' "$value" | grep -q "3940256099942544"; then
              echo "$name: FAIL (contains test publisher prefix)"
              exit 1
            fi
            echo "$name: PASS"
          }
          check_id ADMOB_APP_ID "$ADMOB_APP_ID"
          check_id ADMOB_BANNER_UNIT_ID "$ADMOB_BANNER_UNIT_ID"
          check_id ADMOB_REWARDED_UNIT_ID "$ADMOB_REWARDED_UNIT_ID"

      - name: Build debug APK
        working-directory: AndroidBuild
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
          ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Build release AAB (signed)
        working-directory: AndroidBuild
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_UNIT_ID: ${{ secrets.ADMOB_BANNER_UNIT_ID }}
          ADMOB_REWARDED_UNIT_ID: ${{ secrets.ADMOB_REWARDED_UNIT_ID }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle :app:bundleRelease --no-daemon --stacktrace

      - name: Verify release AAB is signed
        working-directory: AndroidBuild
        run: |
          set -e
          AAB="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB" ]; then
            echo "AAB not found at $AAB"
            exit 1
          fi
          # MANIFEST.MF lists per-file digests but no key material — safe
          # to print for diagnostic purposes.
          unzip -p "$AAB" META-INF/MANIFEST.MF | head -20
          # Real signature check: the AAB must contain a signature block
          # (RSA / DSA / EC) and a corresponding .SF file. Without these
          # the bundle is unsigned and Play would refuse the upload.
          if ! unzip -l "$AAB" | grep -E "META-INF/.*\.(RSA|DSA|EC|SF)" ; then
            echo "AAB IS NOT SIGNED"
            exit 1
          fi
          echo "AAB signed: YES"

      # LAYER 4 — post-build content scan. Decompresses the AAB and
      # searches every entry for the test AdMob publisher prefix.
      # If any byte of the bundle still references the test publisher
      # (manifest, BuildConfig, ProGuard map, anything), the build is
      # rejected. This catches a misconfigured release variant that
      # somehow slipped past Layers 1-3.
      - name: Verify release AAB has REAL ad ids (post-build)
        working-directory: AndroidBuild
        run: |
          set -e
          AAB="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB" ]; then
            echo "AAB missing for post-build scan"
            exit 1
          fi
          # Stream every entry of the AAB through grep without
          # extracting to disk. Any match aborts the build.
          if unzip -p "$AAB" '*' | grep -q "3940256099942544"; then
            echo "FATAL: AAB contains test AdMob publisher prefix"
            echo "Release build is using test ids — Play Store would reject."
            exit 1
          fi
          echo "AAB ad ids verified: REAL (no test publisher detected)"

      - name: Stage build outputs
        working-directory: AndroidBuild
        run: |
          set -e
          apk_src="app/build/outputs/apk/debug/app-debug.apk"
          apk_dst="app/build/outputs/apk/debug/lasttile-debug.apk"
          aab_src="app/build/outputs/bundle/release/app-release.aab"
          aab_dst="app/build/outputs/bundle/release/lasttile-release.aab"

          if [ ! -f "$apk_src" ]; then
            echo "Expected debug APK not found at $apk_src"
            exit 1
          fi
          cp "$apk_src" "$apk_dst"

          if [ ! -f "$aab_src" ]; then
            echo "Expected release AAB not found at $aab_src"
            exit 1
          fi
          cp "$aab_src" "$aab_dst"

          ls -la app/build/outputs/apk/debug/
          ls -la app/build/outputs/bundle/release/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lasttile-native-apk
          path: AndroidBuild/app/build/outputs/apk/debug/lasttile-debug.apk
          retention-days: 1
          if-no-files-found: error

      - name: Upload release AAB (signed)
        uses: actions/upload-artifact@v4
        with:
          name: lasttile-release-aab-signed
          path: AndroidBuild/app/build/outputs/bundle/release/lasttile-release.aab
          retention-days: 1
          if-no-files-found: error

      - name: Summary
        run: |
          echo "Debug APK and signed release AAB built."
          echo "Artifacts on this run:"
          echo "  - lasttile-native-apk         (sideload-installable debug APK)"
          echo "  - lasttile-release-aab-signed (Play-uploadable AAB, signed with the upload key)"
          echo "On your phone: enable 'Install unknown apps' for your browser/file manager, then open the APK."
