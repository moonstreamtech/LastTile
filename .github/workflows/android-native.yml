name: Android APK & AAB

on:
  push:
    branches: [main, master, 'claude/**', 'codex/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: android-native-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK + release AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build debug APK
        working-directory: AndroidBuild
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Build release AAB (signed)
        working-directory: AndroidBuild
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle :app:bundleRelease --no-daemon --stacktrace

      - name: Verify release AAB is signed
        working-directory: AndroidBuild
        run: |
          set -e
          AAB="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB" ]; then
            echo "AAB not found at $AAB"
            exit 1
          fi
          # MANIFEST.MF lists per-file digests but no key material — safe
          # to print for diagnostic purposes.
          unzip -p "$AAB" META-INF/MANIFEST.MF | head -20
          # Real signature check: the AAB must contain a signature block
          # (RSA / DSA / EC) and a corresponding .SF file. Without these
          # the bundle is unsigned and Play would refuse the upload.
          if ! unzip -l "$AAB" | grep -E "META-INF/.*\.(RSA|DSA|EC|SF)" ; then
            echo "AAB IS NOT SIGNED"
            exit 1
          fi
          echo "AAB signed: YES"

      - name: Stage build outputs
        working-directory: AndroidBuild
        run: |
          set -e
          apk_src="app/build/outputs/apk/debug/app-debug.apk"
          apk_dst="app/build/outputs/apk/debug/lasttile-debug.apk"
          aab_src="app/build/outputs/bundle/release/app-release.aab"
          aab_dst="app/build/outputs/bundle/release/lasttile-release.aab"

          if [ ! -f "$apk_src" ]; then
            echo "Expected debug APK not found at $apk_src"
            exit 1
          fi
          cp "$apk_src" "$apk_dst"

          if [ ! -f "$aab_src" ]; then
            echo "Expected release AAB not found at $aab_src"
            exit 1
          fi
          cp "$aab_src" "$aab_dst"

          ls -la app/build/outputs/apk/debug/
          ls -la app/build/outputs/bundle/release/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lasttile-native-apk
          path: AndroidBuild/app/build/outputs/apk/debug/lasttile-debug.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload release AAB (signed)
        uses: actions/upload-artifact@v4
        with:
          name: lasttile-release-aab-signed
          path: AndroidBuild/app/build/outputs/bundle/release/lasttile-release.aab
          retention-days: 14
          if-no-files-found: error

      - name: Summary
        run: |
          echo "Debug APK and signed release AAB built."
          echo "Artifacts on this run:"
          echo "  - lasttile-native-apk         (sideload-installable debug APK)"
          echo "  - lasttile-release-aab-signed (Play-uploadable AAB, signed with the upload key)"
          echo "On your phone: enable 'Install unknown apps' for your browser/file manager, then open the APK."
